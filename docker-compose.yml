# =============================================================================
# NKDash Solo Mode — Single-Container Deployment
# =============================================================================
# Architecture: 1 container, 3 processes via supervisord
#   1. gunicorn    → Dash BI dashboard  (port 8050)
#   2. streamlit   → Admin UI          (port 8501)
#   3. scheduler   → ETL daemon         (background)
#
# Usage:
#   docker-compose up --build -d
#   docker-compose logs -f nkdash
#   docker-compose exec nkdash supervisorctl status
#
# Data Lake:
#   Bind-mount ./data-lake → /data-lake (Parquet files)
#   Created automatically if missing.
# =============================================================================

services:
  nkdash:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nkdash
    restart: unless-stopped

    # Resource limits (conservative for free-tier VMs)
    mem_limit: 4g
    mem_reservation: 2g

    # Expose both Dash (public) and Streamlit (admin)
    ports:
      - "${NKDASH_PORT:-8050}:8050"
      - "${NKDASH_ADMIN_PORT:-8501}:8501"

    # Health check — hits Dash /health endpoint
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    # Environment
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_LAKE_ROOT=/data-lake
      - DASH_CACHE_TTL_SECONDS=${DASH_CACHE_TTL_SECONDS:-600}
      - ODOO_HOST=${ODOO_HOST}
      - ODOO_PORT=${ODOO_PORT:-443}
      - ODOO_PROTOCOL=${ODOO_PROTOCOL:-jsonrpc+ssl}
      - ODOO_DB=${ODOO_DB}
      - ODOO_USERNAME=${ODOO_USERNAME}
      - ODOO_API_KEY=${ODOO_API_KEY}

    # Volumes
    volumes:
      # Data lake — Parquet files (shared with ETL scheduler)
      - ${DATA_LAKE_PATH:-./data-lake}:/data-lake
      # Application logs
      - ./logs:/app/logs
      # Assets (Dash theme, images)
      - ./assets:/app/assets:ro

    # supervisorctl via docker-compose exec
    # e.g.: docker-compose exec nkdash supervisorctl restart gunicorn
