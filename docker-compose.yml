services:
  redis:
    image: redis:7-alpine
    container_name: redis_etl
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  celery-worker:
    build: .
    user: root
    mem_limit: 1g
    mem_reservation: 512m
    command: >
      sh -c "celery -A etl_tasks worker 
      --loglevel=info 
      --concurrency=2
      -Q celery,extraction,transformation,loading,dimensions"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ODOO_HOST=${ODOO_HOST}
      - ODOO_PORT=${ODOO_PORT:-443}
      - ODOO_PROTOCOL=${ODOO_PROTOCOL:-jsonrpc+ssl}
      - ODOO_DB=${ODOO_DB}
      - ODOO_USERNAME=${ODOO_USERNAME}
      - ODOO_API_KEY=${ODOO_API_KEY}
      - DATA_LAKE_ROOT=/data-lake
      - CELERY_WORKER_RUNNING=1
    volumes:
      - .:/app
      - D:\data-lake:/data-lake
      - D:\logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ETL CLI service for headless ETL operations via docker-compose exec
  # Use: docker-compose exec etl-manager-cli python scripts/etl_data_manager_cli.py <command>
  etl-manager-cli:
    build: .
    user: root
    command: >
      sh -c "echo 'ETL Manager CLI service is ready. Use docker-compose exec to run commands.' && 
             tail -f /dev/null"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ODOO_HOST=${ODOO_HOST}
      - ODOO_PORT=${ODOO_PORT:-443}
      - ODOO_PROTOCOL=${ODOO_PROTOCOL:-jsonrpc+ssl}
      - ODOO_DB=${ODOO_DB}
      - ODOO_USERNAME=${ODOO_USERNAME}
      - ODOO_API_KEY=${ODOO_API_KEY}
      - DATA_LAKE_ROOT=/data-lake
      - CELERY_WORKER_RUNNING=1
    volumes:
      - .:/app
      - D:\data-lake:/data-lake
      - D:\logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  celery-beat:
    build: .
    user: root
    command: >
      sh -c "mkdir -p /var/run/celery /var/log/celery && 
      celery -A etl_tasks beat 
      --loglevel=info 
      --schedule=/var/run/celery/beat-schedule"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ODOO_HOST=${ODOO_HOST}
      - ODOO_PORT=${ODOO_PORT:-443}
      - ODOO_PROTOCOL=${ODOO_PROTOCOL:-jsonrpc+ssl}
      - ODOO_DB=${ODOO_DB}
      - ODOO_USERNAME=${ODOO_USERNAME}
      - ODOO_API_KEY=${ODOO_API_KEY}
      - DATA_LAKE_ROOT=/data-lake
    volumes:
      - .:/app
      - D:\data-lake:/data-lake
      - D:\logs:/app/logs
      - celerybeat_data:/var/run/celery
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  dash-app:
    build: .
    user: root
    mem_limit: 2g
    mem_reservation: 1g
    command: gunicorn --workers 1 --threads 1 --timeout 120 --graceful-timeout 120 -b 0.0.0.0:8050 app:server
    ports:
      - "8050:8050"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - REDIS_CONNECTION_POOL_SIZE=10
      - REDIS_MAX_CONNECTIONS=20
      - DASH_CACHE_TTL_SECONDS=600
      - DATA_LAKE_ROOT=/data-lake
    volumes:
      - .:/app
      - D:\data-lake:/data-lake
      - D:\logs:/app/logs
      - ./assets:/app/assets
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    restart: unless-stopped

volumes:
  redis_data:
  celerybeat_data:
